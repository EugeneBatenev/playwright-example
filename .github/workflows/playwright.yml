name: playwright tests example lol

on:
  workflow_dispatch:
    inputs:
      ALLURE_JOB_RUN_ID:
        description: "ALLURE_JOB_RUN_ID service parameter. Leave blank."
        required: false
      ALLURE_USERNAME:
        description: "ALLURE_USERNAME service parameter. Leave blank"
        required: false
      CHESHI_ALLURE:
        description: "Use allurectl from cheshi-mantu local builds"
        required: true
        type: boolean
        default: false

env:
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_ENDPOINT: https://testing.testops.cloud/
  ALLURE_PROJECT_ID: 11844
  ALLURE_RESULTS: allure-results
  ALLURE_LAUNCH_TAGS: Tag 1
  
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Install allurectl
      if: ${{ github.event.inputs.CHESHI_ALLURE == 'false' }}
      uses: allure-framework/setup-allurectl@v1
      with:
        allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
        allure-token: ${{ secrets.ALLURE_TOKEN }}
        allure-project-id: ${{ env.ALLURE_PROJECT_ID }}

    - uses: actions/github-script@v4
      if: ${{ github.event.inputs.CHESHI_ALLURE == 'true' }}
      id: allure-job-uid
      with:
        result-encoding: string
        script: |
          const result = await github.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });
          return `${context.repo.owner}/${context.repo.repo}/actions/workflows/${result.data.workflow_id}`

    - name: Download and make allurectl executable
      if: ${{ github.event.inputs.CHESHI_ALLURE == 'true' }}
      run: |
        wget https://github.com/cheshi-mantu/allurectl-local-builds/releases/download/2.21.0/allurectl_linux_amd64 -O ./allurectl
        chmod +x ./allurectl
        echo "$PWD" >> $GITHUB_PATH

    - name: Log ALLURE_USERNAME
      run: echo ${{ github.event.inputs.ALLURE_USERNAME }}

    - name: Run Playwright tests
      run: allurectl watch -- npx playwright test
      env:
        TEST_ENDPOINT: ${{ github.event.inputs.TEST_ENDPOINT }}
        TEST_BROWSER: ${{ github.event.inputs.TEST_BROWSER }}
        ALLURE_JOB_RUN_UID: ${{ steps.allure-job-uid.outputs.result }}
